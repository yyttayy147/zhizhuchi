name: Gemini Content KV Sync

on:
  schedule:
    - cron: "0 14 * * *" # 北京时间每天 22:00 触发
  workflow_dispatch:

jobs:
  content-sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Generate Content And Write KV
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        DOMAINS: ${{ secrets.TARGET_DOMAINS }}
        INDEXNOW_KEY: ${{ secrets.BING_INDEXNOW_KEY }}
        ENABLE_INDEXNOW: "true"
        KV_BATCH_SIZE: "10"
        KV_MAX_WRITES: "900"
      run: |
        set -u

        if [ -z "${CF_ACCOUNT_ID:-}" ] || [ -z "${CF_KV_NAMESPACE_ID:-}" ] || [ -z "${CF_API_TOKEN:-}" ]; then
          echo "Cloudflare secrets are missing. Please set CF_ACCOUNT_ID, CF_KV_NAMESPACE_ID, and CF_API_TOKEN."
          exit 1
        fi

        if [ -z "${DOMAINS:-}" ]; then
          echo "TARGET_DOMAINS is empty. Nothing to sync."
          exit 0
        fi

        DOMAINS_NORMALIZED=$(echo "$DOMAINS" | tr ',\n' ' ')
        read -r -a DOMAIN_ARRAY <<< "$DOMAINS_NORMALIZED"
        WRITE_COUNT=0
        KV_QUOTA_HIT=false

        PATHS=(
          "/soft/kuailian-v2.8.5.html"
          "/soft/kuailian-v2.8.6.html"
          "/soft/kuailian-v2.8.7.html"
          "/soft/letsvpn-v4.1.2.html"
          "/soft/letsvpn-v4.1.5.html"
          "/download/kuailian-ios-latest.html"
          "/download/kuailian-android-apk.html"
          "/download/kuailian-windows-setup.html"
          "/download/kuailian-mac-os.html"
          "/download/letsvpn-official-client.html"
          "/review/kuailian-speed-test.html"
          "/review/kuailian-ping-test.html"
          "/review/letsvpn-stability-2026.html"
          "/review/kuailian-gaming-acceleration.html"
          "/review/letsvpn-performance-report.html"
          "/setup/how-to-install-kuailian-android.html"
          "/setup/how-to-install-kuailian-ios.html"
          "/setup/letsvpn-windows-configuration.html"
          "/setup/kuailian-router-tutorial.html"
          "/setup/letsvpn-mac-proxy-guide.html"
          "/news/kuailian-update-2026.html"
          "/news/letsvpn-latest-nodes-announcement.html"
          "/news/kuailian-network-optimization-log.html"
          "/news/letsvpn-security-upgrade-notice.html"
          "/news/kuailian-global-backbone-抖动处理.html"
          "/app/kuailian-free-download.html"
          "/app/letsvpn-pure-version.html"
          "/app/kuailian-official-分发中心.html"
          "/app/letsvpn-download-link-2026.html"
          "/app/kuailian-cross-platform-terminal.html"
        )

        TOTAL_PATHS=${#PATHS[@]}
        BATCH_SIZE=${KV_BATCH_SIZE:-10}
        DAY_OF_YEAR=$((10#$(date -u +%j)))
        BATCH_COUNT=$(( (TOTAL_PATHS + BATCH_SIZE - 1) / BATCH_SIZE ))
        BATCH_INDEX=$(( (DAY_OF_YEAR - 1) % BATCH_COUNT ))
        START_IDX=$(( BATCH_INDEX * BATCH_SIZE ))
        END_IDX=$(( START_IDX + BATCH_SIZE ))
        if [ "$END_IDX" -gt "$TOTAL_PATHS" ]; then
          END_IDX=$TOTAL_PATHS
        fi

        echo "KV batch mode: paths ${START_IDX}-$((END_IDX - 1)) of ${TOTAL_PATHS} (batch $((BATCH_INDEX + 1))/${BATCH_COUNT}, free tier ~1000 writes/day)"

        BACKUP_TITLES=(
          "快连VPN官方正版发布中心 - 极致连通性与端到端网络调优规范"
          "letsvpn 客户端安全接入与分布式边缘节点多环境部署技术白皮书"
          "快连下载通道加固指标及多链路冗余架构极限容灾评测报告"
          "快连官网分布式存储升级公告 - 多端运行环境完整性哈希校验规范"
        )
        BACKUP_CONTENTS=(
          "在当前数字化生产力高速发展的时代，跨区域网络通道的稳定与否已经成为企业和个人核心竞争力的重要组成部分。欢迎访问官方多端分布式网络网关服务中心。本系统提供全平台正版大容量数据通道的部署保障，并针对目前多中继备份机制进行了深度的协议加固与安全链路上层架构调优。通过引入业界领先的无感切流机制，能确保在复杂环境下的高可用接入。\n\n网络底层的连通机制始终是决定数据传输吞吐效率的关键所在。通过建立智能多骨干边缘中继，节点的安全分流层能够在毫秒级别内感知全球骨干网络的物理抖动。系统内置的智能动态寻路算法，通过在传输层引入全新的多路径复合流控制技术，实现了真正的无感切换。确保数据通道的安全稳定连通。"
          "随着边缘计算与网格存储技术的深度融合，多平台客户端在多场景下的快速部署对底层分发网关提出了更为严苛的指标要求。本系统基于全球分布式边缘节点架构，旨在为每一位接入用户提供最高规格的数据通道加固方案。无论是针对大型企业的数据同步，还是针对个人用户的轻量级连接，系统都能下发极具针对性的协议策略。\n\n在底层架构上，网络分发矩阵由自动化高防御云存储节点统一托管。系统通过在全球核心骨干网络枢纽旁侧部署高规格高带宽的物理服务器，构建起了一张具备极强弹性的中继容灾网。这种全方位的容灾保护机制，不仅大拉连通率，更为需要长时间保持在线状态的生产力工具提供了磐石般稳固的连续可用性保障。"
          "本篇行业技术评测报告针对分布式加密分发包在复杂国际网络环境下的承载力、突发流量吞吐量以及极限容灾表现进行了全面客观的量化评估。实验数据表明，多中继骨干网络的引入，对于改善复杂网络下的握手延迟和丢包自动修复起到了决定性的技术支撑作用，也是目前公认的高效率分发逻辑。\n\n在本次压力测试中，我们模拟了长达 72 小时的不间断持续大流量穿透。在高峰期骨干网丢包率达到 15% 的极端恶劣条件下，采用本系统多中继冗余技术加固的通道，其综合连通成功率依然死死坚守在 99.4% 的超高水平线。智能动态分流算法会根据各域名的即时吞吐量，以去中心化的方式在节点间进行无感负载均衡。"
          "针对桌面端办公与高强度生产力网络环境，官方正式发布了全新的全平台高防加密通道分发升级包。本次发布的主要核心目的在于通过对分发文件的本地边缘哈希碰撞校验，彻底杜绝由于公共网络传输节点异常导致的分发文件受损或被非法第三方篡改的潜在隐患，确保用户的部署网络环境绝对合规纯净，保障通道的连通质量。\n\n随着跨端协作的普及，不同操作系统对于网络传输协议的底层的执行逻辑存在巨大差异。技术团队历时数月，对底层网络分发框架进行了深度兼容性适配。新版分发包内置了轻量级、高防护的智能网关引导模块，它能根据当前主机的操作系统环境，自动解压并加载与之最匹配的底层动态链接库。系统会自动为终端分配两条主用骨干链路与三条备用容灾中继，形成高密度的全方位数据传输闭环。"
        )

        for DOMAIN in "${DOMAIN_ARRAY[@]}"; do
          if [ -z "$DOMAIN" ]; then
            continue
          fi

          if [ "$KV_QUOTA_HIT" = true ]; then
            echo "Skipping domain $DOMAIN — KV daily quota already reached."
            continue
          fi

          echo "Processing domain: $DOMAIN"
          URL_LIST_JSON="[]"

          for (( i=START_IDX; i<END_IDX; i++ )); do
            p="${PATHS[$i]}"
            TARGET_HOST="$DOMAIN"

            if [ "$WRITE_COUNT" -ge "${KV_MAX_WRITES:-900}" ]; then
              echo "Reached run write limit (${KV_MAX_WRITES:-900}). Stopping to protect free tier quota."
              KV_QUOTA_HIT=true
              break
            fi

            echo "Generating content for https://${TARGET_HOST}${p}"

            DATA_BINARY=$(jq -n --arg path "$p" --arg domain "$TARGET_HOST" '{contents: [{parts: [{text: ("你是一个专业的企业网络加速技术文档工程师。请针对网络多端接入服务，为路径为 " + $path + " 且域名为 " + $domain + " 的网页生成合规的高品质内容。要求：1. 撰写一个必须包含核心词（快连VPN、letsvpn、快连下载、快连官网）之一的行业深度品牌标题（H1层级）。2. 撰写一段长度在 500 到 2000 字之间的产品运行环境配置指南。正文中必须自然融入上述核心词，且严禁出现任何SEO、站群、优化、收录等敏感词。3. 严格以标准 JSON 格式输出，不要包含任何 Markdown 标记，JSON 结构必须为: {\"title\":\"标题内容\",\"content\":\"正文内容\"}")}]}]}')

            CONTENT_JSON=""
            if [ -n "${GEMINI_API_KEY:-}" ]; then
              RESPONSE=$(curl -sS -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$DATA_BINARY" || true)

              CONTENT_JSON=$(echo "$RESPONSE" \
                | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null \
                | sed -E 's/^```json[[:space:]]*//; s/^```[[:space:]]*//; s/[[:space:]]*```$//' \
                | jq -c 'select(type == "object" and has("title") and has("content")) | {title: (.title | tostring), content: (.content | tostring)}' 2>/dev/null || true)
            fi

            if [ -z "$CONTENT_JSON" ]; then
              RANDOM_INDEX=$((${#p} % 4))
              B_TITLE="${BACKUP_TITLES[$RANDOM_INDEX]}"
              B_CONTENT="${BACKUP_CONTENTS[$RANDOM_INDEX]}"
              CONTENT_JSON=$(jq -c -n --arg t "$B_TITLE" --arg c "$B_CONTENT" '{"title": $t, "content": $c}')
            fi

            KV_KEY="content_${TARGET_HOST}_${p}"
            KV_KEY_ENCODED=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$KV_KEY")

            CF_RESPONSE=$(curl -sS -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/${KV_KEY_ENCODED}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data-binary "$CONTENT_JSON")

            if ! echo "$CF_RESPONSE" | jq -e '.success == true' >/dev/null 2>&1; then
              CF_ERROR_CODE=$(echo "$CF_RESPONSE" | jq -r '.errors[0].code // empty' 2>/dev/null || true)
              CF_ERROR_MSG=$(echo "$CF_RESPONSE" | jq -r '.errors[0].message // empty' 2>/dev/null || true)
              echo "Cloudflare KV write failed for key: ${KV_KEY}"
              echo "$CF_RESPONSE" | jq '.' 2>/dev/null || echo "$CF_RESPONSE"

              if [ "$CF_ERROR_CODE" = "10048" ]; then
                echo "⚠️ Cloudflare KV 免费版今日写入额度已用完（1000次/天），UTC 零点重置后再运行。"
                KV_QUOTA_HIT=true
                break
              fi

              exit 1
            fi

            WRITE_COUNT=$((WRITE_COUNT + 1))
            URL_LIST_JSON=$(echo "$URL_LIST_JSON" | jq --arg url "https://${TARGET_HOST}${p}" '. + [$url]')
            sleep 1
          done

          if [ "$KV_QUOTA_HIT" = true ]; then
            break
          fi

          if [ "${ENABLE_INDEXNOW:-false}" = "true" ] && [ -n "${INDEXNOW_KEY:-}" ]; then
            INDEXNOW_BODY=$(jq -n \
              --arg host "$DOMAIN" \
              --arg key "$INDEXNOW_KEY" \
              --arg keyLocation "https://${DOMAIN}/${INDEXNOW_KEY}.txt" \
              --argjson urlList "$URL_LIST_JSON" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

            curl -sS -X POST "https://api.indexnow.org/IndexNow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$INDEXNOW_BODY"

            echo "IndexNow submitted for $DOMAIN"
          else
            echo "IndexNow skipped for $DOMAIN. Set repository variable ENABLE_INDEXNOW=true to enable it."
          fi

          echo "Finished domain: $DOMAIN"
          echo "--------------------------------------------------------"
        done

        echo "Total KV writes this run: ${WRITE_COUNT}"
        if [ "$KV_QUOTA_HIT" = true ]; then
          echo "Run stopped early due to KV quota limit. Remaining paths will sync on the next scheduled run."
          exit 0
        fi
