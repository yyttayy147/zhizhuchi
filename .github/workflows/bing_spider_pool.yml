name: Gemini Content KV Sync

on:
  schedule:
    - cron: "0 0 * * *"   # 北京时间 08:00
    - cron: "0 4 * * *"   # 北京时间 12:00
    - cron: "0 8 * * *"   # 北京时间 16:00
    - cron: "0 12 * * *"  # 北京时间 20:00
    - cron: "0 16 * * *"  # 北京时间 00:00
  workflow_dispatch:

jobs:
  content-sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Generate Articles Per Domain And Write KV
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        DOMAINS: ${{ secrets.TARGET_DOMAINS }}
        INDEXNOW_KEY: ${{ secrets.BING_INDEXNOW_KEY }}
        ENABLE_INDEXNOW: "true"
        ARTICLES_PER_RUN: "3"
      run: |
        set -u

        if [ -z "${CF_ACCOUNT_ID:-}" ] || [ -z "${CF_KV_NAMESPACE_ID:-}" ] || [ -z "${CF_API_TOKEN:-}" ]; then
          echo "Cloudflare secrets are missing."
          exit 1
        fi

        if [ -z "${DOMAINS:-}" ]; then
          echo "TARGET_DOMAINS is empty."
          exit 0
        fi

        DOMAINS_NORMALIZED=$(echo "$DOMAINS" | tr ',\n' ' ')
        read -r -a DOMAIN_ARRAY <<< "$DOMAINS_NORMALIZED"

        PATHS=()
        while IFS= read -r line; do
          [ -n "$line" ] && PATHS+=("$line")
        done < <(node scripts/list-content-paths.js)

        kv_key_encode() {
          python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$1"
        }

        kv_has_content() {
          local key="$1"
          local encoded
          encoded="$(kv_key_encode "$key")"
          local code
          code=$(curl -sS -o /tmp/kv_check.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/${encoded}" || echo "000")
          [ "$code" = "200" ] && [ -s /tmp/kv_check.txt ]
        }

        pick_paths_for_domain() {
          local domain="$1"
          local -n _out=$2
          _out=()
          local base_index=$(( (10#$DAY_INDEX * 15 + SLOT * ARTICLES_PER_RUN) % ${#PATHS[@]} ))
          local scan_limit=12
          local picked_count=0
          local j=0

          while [ "$picked_count" -lt "$ARTICLES_PER_RUN" ] && [ "$j" -lt "$scan_limit" ]; do
            local idx=$(( (base_index + j) % ${#PATHS[@]} ))
            local candidate="${PATHS[$idx]}"
            local kv_key="content_${domain}_${candidate}"
            j=$((j + 1))

            if kv_has_content "$kv_key"; then
              continue
            fi

            _out+=("$candidate")
            picked_count=$((picked_count + 1))
          done

          j=0
          while [ "$picked_count" -lt "$ARTICLES_PER_RUN" ] && [ "$j" -lt ${#PATHS[@]} ]; do
            local idx=$(( (base_index + picked_count + j) % ${#PATHS[@]} ))
            local candidate="${PATHS[$idx]}"
            j=$((j + 1))

            local duplicate=0
            local existing
            for existing in "${_out[@]}"; do
              if [ "$existing" = "$candidate" ]; then
                duplicate=1
                break
              fi
            done
            if [ "$duplicate" -eq 1 ]; then
              continue
            fi

            _out+=("$candidate")
            picked_count=$((picked_count + 1))
          done
        }

        UTC_HOUR=$(date -u +%H)
        DAY_INDEX=$(date -u +%j)
        case "$UTC_HOUR" in
          00) SLOT=0 ;;
          04) SLOT=1 ;;
          08) SLOT=2 ;;
          12) SLOT=3 ;;
          16) SLOT=4 ;;
          *) SLOT=$((10#$DAY_INDEX % 5)) ;;
        esac

        echo "Daily slot: $SLOT / 5 | articles per domain per run: ${ARTICLES_PER_RUN}"
        echo "Total paths in pool: ${#PATHS[@]}"

        for DOMAIN in "${DOMAIN_ARRAY[@]}"; do
          if [ -z "$DOMAIN" ]; then
            continue
          fi

          echo "Processing domain: $DOMAIN"
          URL_LIST_JSON="[]"
          TARGET_HOST="$DOMAIN"

          PICKED_PATHS=()
          pick_paths_for_domain "$DOMAIN" PICKED_PATHS

          if [ "${#PICKED_PATHS[@]}" -eq 0 ]; then
            echo "No paths selected for $DOMAIN, skipping."
            continue
          fi

          echo "Selected paths: ${PICKED_PATHS[*]}"

          for p in "${PICKED_PATHS[@]}"; do
            echo "Generating content for https://${TARGET_HOST}${p}"

            PROMPT_TEXT=$(node scripts/build-gemini-prompt.js "$p" "$TARGET_HOST" "$SLOT")
            DATA_BINARY=$(jq -n --arg text "$PROMPT_TEXT" '{contents: [{parts: [{text: $text}]}]}')

            CONTENT_JSON=""
            if [ -n "${GEMINI_API_KEY:-}" ]; then
              RESPONSE=$(curl -sS -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$DATA_BINARY" || true)

              CONTENT_JSON=$(echo "$RESPONSE" \
                | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null \
                | sed -E 's/^```json[[:space:]]*//; s/^```[[:space:]]*//; s/[[:space:]]*```$//' \
                | jq -c 'select(type == "object" and has("title") and has("content")) | {title: (.title | tostring), content: (.content | tostring)}' 2>/dev/null || true)
            fi

            if [ -z "$CONTENT_JSON" ]; then
              CONTENT_JSON=$(node scripts/pick-backup-article.js "$p" "$TARGET_HOST" "$SLOT")
            fi

            KV_KEY="content_${TARGET_HOST}_${p}"
            KV_KEY_ENCODED=$(kv_key_encode "$KV_KEY")

            CF_RESPONSE=$(curl -sS -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/${KV_KEY_ENCODED}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data-binary "$CONTENT_JSON")

            if ! echo "$CF_RESPONSE" | jq -e '.success == true' >/dev/null 2>&1; then
              echo "Cloudflare KV write failed for key: ${KV_KEY}"
              echo "$CF_RESPONSE" | jq '.' 2>/dev/null || echo "$CF_RESPONSE"
              exit 1
            fi

            URL_LIST_JSON=$(echo "$URL_LIST_JSON" | jq --arg url "https://${TARGET_HOST}${p}" '. + [$url]')
            sleep 1
          done

          if [ "${ENABLE_INDEXNOW:-false}" = "true" ] && [ -n "${INDEXNOW_KEY:-}" ]; then
            INDEXNOW_BODY=$(jq -n \
              --arg host "$DOMAIN" \
              --arg key "$INDEXNOW_KEY" \
              --arg keyLocation "https://${DOMAIN}/${INDEXNOW_KEY}.txt" \
              --argjson urlList "$URL_LIST_JSON" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

            curl -sS -X POST "https://api.indexnow.org/IndexNow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$INDEXNOW_BODY"

            echo "IndexNow submitted for $DOMAIN (${#PICKED_PATHS[@]} urls)"
          fi

          echo "Finished domain: $DOMAIN"
          echo "--------------------------------------------------------"
        done
