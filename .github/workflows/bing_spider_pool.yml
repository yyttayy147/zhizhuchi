name: Gemini Content Generator & Bing IndexNow Push

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Sync AI Content Directly to Cloudflare
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        DOMAIN: "aideep-seek.icu"
      run: |
        PATHS=(
          "/soft/kuailian-v2.8.5.html" 
          "/download/kuailian-ios-latest.html" 
          "/review/kuailian-speed-test.html" 
          "/setup/how-to-install-kuailian-android.html" 
          "/news/kuailian-update-2026.html"
          "/app/kuailian-free-download.html"
          "/soft/kuailian-v2.8.6.html"
          "/download/kuailian-mac-latest.html"
          "/review/kuailian-ping-test.html"
          "/setup/how-to-install-kuailian-ios.html"
        )
        
        KEY="bingpoolsecretkey1234567890"
        URL_LIST=""

        for p in "${PATHS[@]}"; do
          echo "Requesting Gemini for path: $p"
          
          # 直接将 Prompt 组装成纯净的数据体
          DATA_BINARY=$(jq -n --arg path "$p" --arg domain "$DOMAIN" '{contents: [{parts: [{text: ("你是一个专门做软件下载站的 SEO 专家。请针对关键词快连VPN，为路径为 " + $path + " 且域名为 " + $domain + " 的网页生成内容。要求：1. 撰写一个包含长尾词的吸引人标题。2. 撰写一段大约 200 字左右的软件介绍或版本更新日志。3. 严格以标准 JSON 格式输出，结构必须为: {\"title\":\"标题内容\",\"content\":\"正文内容\"}")}]}]}')
          
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$DATA_BINARY")
          
          # 直接将完整的原始响应原封不动地砸进 Cloudflare KV，不做任何加工！
          curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/content_${DOMAIN}_${p}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            -d "$RESPONSE"
            
          URL_LIST="${URL_LIST}\"https://${DOMAIN}${p}\","
        done
        
        URL_LIST=$(echo "${URL_LIST}" | sed 's/,$//')

        # 通知 Bing
        curl -s -X POST "https://api.indexnow.org/IndexNow" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"host\": \"${DOMAIN}\", \"key\": \"${KEY}\", \"keyLocation\": \"https://${DOMAIN}/${KEY}.txt\", \"urlList\": [${URL_LIST}]}"
        
        echo "✅ All data submitted successfully!"
