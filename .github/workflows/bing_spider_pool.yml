name: Gemini Content Generator & Bing IndexNow Push

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Sync AI Content Directly to Cloudflare
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        DOMAIN: "aideep-seek.icu"
      run: |
        PATHS=(
          "/soft/kuailian-v2.8.5.html" 
          "/download/kuailian-ios-latest.html" 
          "/review/kuailian-speed-test.html" 
          "/setup/how-to-install-kuailian-android.html" 
          "/news/kuailian-update-2026.html"
          "/app/kuailian-free-download.html"
          "/soft/kuailian-v2.8.6.html"
          "/download/kuailian-mac-latest.html"
          "/review/kuailian-ping-test.html"
          "/setup/how-to-install-kuailian-ios.html"
        )
        
        KEY="bingpoolsecretkey1234567890"
        URL_LIST=""

        for p in "${PATHS[@]}"; do
          echo "Requesting Gemini 2.5 for path: $p"
          
          # 1. 组装纯净 Prompt 数据体
          DATA_BINARY=$(jq -n --arg path "$p" --arg domain "$DOMAIN" '{contents: [{parts: [{text: ("你是一个专门做软件下载站的 SEO 专家。请针对关键词快连VPN，为路径为 " + $path + " 且域名为 " + $domain + " 的网页生成内容。要求：1. 撰写一个包含长尾词的吸引人标题。2. 撰写一段大约 200 字左右的软件介绍或版本更新日志。3. 严格以标准 JSON 格式输出，结构必须为: {\"title\":\"标题内容\",\"content\":\"正文内容\"}")}]}]}')
          
          # 2. 🚀 请求全新的 gemini-2.5-flash 接口
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$DATA_BINARY")
          
          # 3. 核心纠错防线：如果 2.5 接口调用过快触发限制或 Key 异常，启动本地高级 SEO 引擎组装粮食
          CHECK_VALID=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$CHECK_VALID" ] || [ "$CHECK_VALID" = "null" ]; then
            echo "⚠️ Gemini 限频断流或 Key 异常，启动本地高级 SEO 引擎组装粮食..."
            CLEAN_P=$(echo "$p" | sed 's/\.html//g' | sed 's/\///g' | sed 's/soft//g' | sed 's/download//g' | sed 's/-//g')
            
            # 组装符合 Workers 读取格式的标准标准数据包
            RESPONSE="{\"candidates\":[{\"content\":{\"parts\":[{\"text\":\"{\\\"title\\\":\\\"快连VPN最新官方正版下载 (${CLEAN_P}节点)\\\",\\\"content\\\":\\\"欢迎来到快连在域名 ${DOMAIN} 部署的智能化软件分发网关。本节点针对 ${p} 路径进行了全方位的长尾 SEO 权重优化，完美适配 2026 全平台客户端安全安装。提供极致稳定的网络中继加速服务。\\\"}\"}]}}]}}"
          fi
          
          # 4. 将饱满的数据砸进 Cloudflare KV
          curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/content_${DOMAIN}_${p}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            -d "$RESPONSE"
            
          URL_LIST="${URL_LIST}\"https://${DOMAIN}${p}\","
          
          # 5. 每次循环休眠 3 秒钟，防接口连续轰炸
          sleep 3
        done
        
        URL_LIST=$(echo "${URL_LIST}" | sed 's/,$//')

        # 通知 Bing
        curl -s -X POST "https://api.indexnow.org/IndexNow" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"host\": \"${DOMAIN}\", \"key\": \"${KEY}\", \"keyLocation\": \"https://${DOMAIN}/${KEY}.txt\", \"urlList\": [${URL_LIST}]}"
        
        echo "✅ All data written and submitted successfully with Gemini 2.5!"
