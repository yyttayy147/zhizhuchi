name: Gemini Content Generator & Bing IndexNow Push

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run Spider Pool Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        DOMAINS: "aideep-seek.icu"
run: |
        echo "=== 正在检查当前目录下的所有文件 ==="
        ls -R
        echo "=================================="
        chmod +x script.sh
        bash script.sh
